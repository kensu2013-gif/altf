<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:; script-src * 'unsafe-inline' 'unsafe-eval' data: blob:; style-src * 'unsafe-inline' data: blob:; img-src * data: blob: 'unsafe-inline'; font-src * data: blob:; connect-src * 'unsafe-inline' data: blob:; frame-src * data: blob:;" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">

  <title>ALTF - Alternative Future</title>
</head>

<body class="font-sans text-slate-900 bg-slate-50">
  <div id="root"></div>
  <script>
    // [AUTO-FIX] Safely clean up oversized 'inventory' data from localStorage to prevent QuotaExceededError crashes
    try {
      const storageKey = 'altf-b2b-storage';
      const rawData = localStorage.getItem(storageKey);
      if (rawData && rawData.includes('"inventory"')) {
        const parsed = JSON.parse(rawData);
        if (parsed?.state?.inventory) {
          delete parsed.state.inventory;
          localStorage.setItem(storageKey, JSON.stringify(parsed));
          console.log('[Auto-Fix] Successfully purged oversized inventory from localStorage.');
        }
      }
    } catch (e) {
      console.warn('[Auto-Fix] Failed to clean localStorage, attempting full removal.', e);
      localStorage.removeItem('altf-b2b-storage');
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
